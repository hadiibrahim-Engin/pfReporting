# =============================================================================
# Azure DevOps Pipeline – pfReporting wheel build
# =============================================================================
#
# What this pipeline does:
#   1. Installs Python 3.11
#   2. Installs build dependencies
#   3. Builds a wheel into dist/
#   4. Validates the built distribution with twine check
#   5. Publishes the wheel as a pipeline artifact
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - pfreporting/**
      - cli.py
      - pyproject.toml
      - README.md
      - scripts/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
      - develop

variables:
  PYTHON_VERSION: '3.11'
  DIST_DIR: 'dist'
  ARTIFACT_NAME: 'pfreporting-wheel'

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    clean: true

  - task: UsePythonVersion@0
    displayName: 'Use Python $(PYTHON_VERSION)'
    inputs:
      versionSpec: '$(PYTHON_VERSION)'
      addToPath: true

  - script: |
      python -m pip install --upgrade pip
      pip install build twine hatchling
    displayName: 'Install build tools'

  - script: |
      python -m build --wheel --outdir $(DIST_DIR)
    displayName: 'Build wheel'

  - script: |
      python -m twine check $(DIST_DIR)/*
      python - <<'PY'
      from pathlib import Path

      dist = Path('$(DIST_DIR)')
      wheels = sorted(dist.glob('*.whl'))
      print('Built wheel(s):')
      for wheel in wheels:
          print(f' - {wheel.name}')
      PY
    displayName: 'Validate distribution'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish wheel artifact'
    inputs:
      targetPath: '$(DIST_DIR)'
      artifact: '$(ARTIFACT_NAME)'
      publishLocation: 'pipeline'
